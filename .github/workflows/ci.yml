name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin + run tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (lockfile-strict)
        run: npm ci --no-audit --no-fund

      - name: Validate manifests + SKILL.md frontmatter + sync drift
        # `npm run validate` now also runs the sync drift check (Phase 2 SHARED-04).
        # Failures here mean: run `pnpm sync` locally and commit the result.
        run: npm run validate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Generic docs drift check
        # DIST-02 (Phase 06-02). Re-runs scripts/generate-generic-docs.mjs and
        # fails if any committed file under generic/ differs from fresh
        # generator output. Catches the case where someone edits a SKILL.md
        # without regenerating the non-Claude-agent rehberler.
        run: npm run generic:check

      - name: Best-effort — official Claude plugin validate CLI
        # Phase 1 best-effort: try the official CLI but never block the build.
        # Phase 6 should re-evaluate once the CLI distribution package is confirmed.
        # Tracked as RESEARCH.md A4 / Open Question 2.
        continue-on-error: true
        run: |
          if npx --yes --package=@anthropic-ai/claude-code -- claude plugin validate . 2>/dev/null; then
            echo "✓ Official CLI validation passed"
          else
            echo "::notice::Official 'claude plugin validate' CLI not available in this runner; relying on zod validator (mandatory step above is the gate)."
          fi
